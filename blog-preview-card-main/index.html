<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</head>

<body>
    <div class="p-5 m-0 rounded-bottom" style="background-color:  hsl(47, 88%, 63%); height:100vh;">
        <div class="card mx-auto border border-black " style="max-width: 400px; box-shadow: 10px 11px 0 black;">
            <img src="./assets/images/illustration-article.svg" class="card-img-top p-3 rounded-5" alt="blog-image">

            <div class="card-body">
                <button class="btn rounded-bottom px-4 fw-bold m-0 p"
                    style="background-color:  hsl(47, 88%, 63%)">Learning</button>
                <p class="date fw-semibold pt-2 pb-2 m-0">Published 21 Dec 2023</p>
                <h5 class="card-title fw-bolder  fs-15">HTML & CSS foundation</h5>
                <p class="card-text pe-2 fw-semibold" style="color: hsl(0, 0%, 42%) ">These language are the backbone of
                    every website,
                    defining structure,content, and presentation</p>
            </div>

            <div class="d-flex align-items-center p-2 m-2">

                <img src="./assets/images/image-avatar.webp" class="rounded-circle me-2" width="40" height="40"
                    alt="image">

                <span class="fw-bold">Greg Hooper</span>

            </div>
        </div>
    </div>


</body>

</html>
